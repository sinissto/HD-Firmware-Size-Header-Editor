appId: com.firmware.header-tool
productName: Firmware Header Tool
copyright: Copyright © 2024

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
